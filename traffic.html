<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fréquentation - Bourneville Quest</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="kicker">Statistiques GitHub Traffic</p>
        <h1>Fréquentation</h1>
      </div>
      <a class="paper-link" href="index.html">Retour au jeu</a>
    </header>

    <main>
      <section class="worksheet-panel traffic-panel">
        <span id="trafficUpdated">Chargement des statistiques...</span>
        <div class="traffic-summary" aria-label="Totaux archivés">
          <div>
            <strong id="totalViews">0</strong>
            <span>vues au total</span>
          </div>
          <div>
            <strong id="totalUniqueVisitors">0</strong>
            <span>visiteurs uniques journaliers</span>
          </div>
        </div>
        <div class="traffic-table-wrap">
          <table class="traffic-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Vues</th>
                <th>Visiteurs uniques</th>
              </tr>
            </thead>
            <tbody id="trafficRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const formatter = new Intl.DateTimeFormat("fr-FR", { dateStyle: "medium" });
      const rows = document.querySelector("#trafficRows");
      const updated = document.querySelector("#trafficUpdated");
      const totalViews = document.querySelector("#totalViews");
      const totalUniqueVisitors = document.querySelector("#totalUniqueVisitors");

      fetch(`data/github-traffic-history.json?v=${Date.now()}`)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Historique introuvable");
          }
          return response.json();
        })
        .then((history) => {
          const days = Object.entries(history.days || {}).reverse();
          const totals = days.reduce((sum, [, item]) => ({
            views: sum.views + (item.views ?? 0),
            uniqueVisitors: sum.uniqueVisitors + (item.uniqueVisitors ?? 0)
          }), { views: 0, uniqueVisitors: 0 });

          totalViews.textContent = totals.views;
          totalUniqueVisitors.textContent = totals.uniqueVisitors;
          updated.textContent = history.updatedAt
            ? `Dernière mise à jour : ${formatter.format(new Date(history.updatedAt))}`
            : "Aucune statistique archivée pour le moment.";

          rows.innerHTML = days.length
            ? days.map(([day, item]) => `
                <tr>
                  <td>${formatter.format(new Date(`${day}T00:00:00Z`))}</td>
                  <td>${item.views ?? 0}</td>
                  <td>${item.uniqueVisitors ?? 0}</td>
                </tr>
              `).join("")
            : `<tr><td colspan="3">Les premières données apparaîtront après le premier passage du workflow.</td></tr>`;
        })
        .catch(() => {
          updated.textContent = "Impossible de charger l'historique de fréquentation.";
        });
    </script>
  </body>
</html>
