name: Archive GitHub traffic

on:
  schedule:
    - cron: "35 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive traffic
        run: node scripts/archive-github-traffic.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}

      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-traffic-history.json
          git diff --cached --quiet || git commit -m "Archive GitHub traffic"
          git push
